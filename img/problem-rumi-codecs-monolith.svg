<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" role="img" aria-label="DEFLATE, ZSTD and Brotli share the same pieces, yet GDAL must wrap a separate library for every codec and the file breaks if the reader was not built with it">
<style>
.mono{font-family:'Cascadia Code','Fira Code','Consolas',monospace;}
.sans{font-family:'League Spartan','Futura','Century Gothic',system-ui,sans-serif;}
</style>
<rect width="1000" height="480" fill="#FFFFFF"/>

<!-- DEFLATE -->
<rect x="120" y="48" width="400" height="56" rx="12" fill="#1F2937"/>
<text class="mono" x="140" y="81" font-size="13" font-weight="700" fill="#FFFFFF">DEFLATE</text>
<rect x="240" y="63" width="56" height="26" rx="7" fill="#4E04EB"/><text class="mono" x="268" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">LZ</text>
<rect x="308" y="63" width="92" height="26" rx="7" fill="#F8CE00"/><text class="mono" x="354" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Huffman</text>

<!-- ZSTD -->
<rect x="120" y="132" width="400" height="56" rx="12" fill="#1F2937"/>
<text class="mono" x="140" y="165" font-size="13" font-weight="700" fill="#FFFFFF">ZSTD</text>
<rect x="240" y="147" width="56" height="26" rx="7" fill="#4E04EB"/><text class="mono" x="268" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">LZ</text>
<rect x="308" y="147" width="92" height="26" rx="7" fill="#F8CE00"/><text class="mono" x="354" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Huffman</text>
<rect x="412" y="147" width="56" height="26" rx="7" fill="#16A34A"/><text class="mono" x="440" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">FSE</text>

<!-- Brotli -->
<rect x="120" y="216" width="400" height="56" rx="12" fill="#1F2937"/>
<text class="mono" x="140" y="249" font-size="13" font-weight="700" fill="#FFFFFF">Brotli</text>
<rect x="240" y="231" width="56" height="26" rx="7" fill="#4E04EB"/><text class="mono" x="268" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">LZ</text>
<rect x="308" y="231" width="92" height="26" rx="7" fill="#F8CE00"/><text class="mono" x="354" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Huffman</text>
<rect x="412" y="231" width="92" height="26" rx="7" fill="#0EA5E9"/><text class="mono" x="458" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">context</text>

<!-- shared-column highlight -->
<rect x="234" y="44" width="172" height="232" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.4" stroke-dasharray="4 4"/>
<text class="sans" x="320" y="296" text-anchor="middle" font-size="11" fill="#9CA3AF">same two pieces, every time</text>

<!-- right callout -->
<text class="sans" x="560" y="86" font-size="14" font-weight="600" fill="#1A1A1A">The same pieces repeat</text>
<rect x="560" y="104" width="14" height="14" rx="3" fill="#4E04EB"/><text class="sans" x="582" y="116" font-size="12.5" fill="#6B7280">LZ matching</text>
<rect x="560" y="128" width="14" height="14" rx="3" fill="#F8CE00"/><text class="sans" x="582" y="140" font-size="12.5" fill="#6B7280">Huffman coding</text>
<text class="sans" x="560" y="176" font-size="12.5" fill="#6B7280">in every single codec</text>
<text class="sans" x="560" y="196" font-size="12.5" fill="#9CA3AF">yet nothing is shared</text>

<line x1="120" y1="360" x2="880" y2="360" stroke="#F1F3F5" stroke-width="1"/>
<text class="sans" x="500" y="392" text-anchor="middle" font-size="15" font-weight="600" fill="#1A1A1A">For every codec, GDAL wraps another library.</text>
<text class="sans" x="500" y="416" text-anchor="middle" font-size="12.5" fill="#6B7280">Each one adds a dependency and makes the API harder.</text>
<text class="sans" x="500" y="436" text-anchor="middle" font-size="12.5" fill="#9CA3AF">And the file breaks if the reader was not built with it.</text>
</svg>