<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460" role="img" aria-label="A generic GeoTIFF stores the whole IFD plus TileOffsets and TileByteCounts. rumi stores a 26 byte header, one base offset and a single TileByteCounts array, deriving every offset by a prefix sum. index_file builds the blob, parse rebuilds the header with no I/O">
<style>
.mono{font-family:'Cascadia Code','Fira Code','Consolas',monospace;}
.sans{font-family:'League Spartan','Futura','Century Gothic',system-ui,sans-serif;}
</style>
<rect width="1000" height="460" fill="#FFFFFF"/>

<line x1="500" y1="36" x2="500" y2="300" stroke="#E5E7EB" stroke-width="1"/>

<!-- LEFT: generic GeoTIFF -->
<text class="sans" x="48" y="46" font-size="16" font-weight="600" fill="#1A1A1A">Generic GeoTIFF</text>
<text class="sans" x="48" y="66" font-size="12" fill="#9CA3AF">the whole IFD, then two arrays</text>
<rect x="48" y="80" width="404" height="44" rx="10" fill="#F1F3F5" stroke="#CBD5E1" stroke-width="1"/>
<text class="mono" x="66" y="102" font-size="13" font-weight="700" fill="#1A1A1A">TIFF IFD</text>
<text class="sans" x="66" y="118" font-size="11" fill="#9CA3AF">width, length, tile size, compression, &#8230;</text>

<text class="sans" x="132" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#9CA3AF">TileOffsets</text>
<text class="sans" x="330" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#9CA3AF">TileByteCounts</text>

<rect x="52" y="154" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="132" y="171" text-anchor="middle" font-size="12" fill="#1A1A1A">4096</text>
<rect x="52" y="184" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="132" y="201" text-anchor="middle" font-size="12" fill="#1A1A1A">4168</text>
<rect x="52" y="214" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="132" y="231" text-anchor="middle" font-size="12" fill="#1A1A1A">4220</text>
<rect x="52" y="244" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="132" y="261" text-anchor="middle" font-size="12" fill="#1A1A1A">4308</text>
<text class="mono" x="132" y="286" text-anchor="middle" font-size="14" fill="#6E7681">&#8942;</text>

<rect x="250" y="154" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="330" y="171" text-anchor="middle" font-size="12" fill="#1A1A1A">72</text>
<rect x="250" y="184" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="330" y="201" text-anchor="middle" font-size="12" fill="#1A1A1A">52</text>
<rect x="250" y="214" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="330" y="231" text-anchor="middle" font-size="12" fill="#1A1A1A">88</text>
<rect x="250" y="244" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="330" y="261" text-anchor="middle" font-size="12" fill="#1A1A1A">60</text>
<text class="mono" x="330" y="286" text-anchor="middle" font-size="14" fill="#6E7681">&#8942;</text>

<!-- RIGHT: rumi -->
<text class="sans" x="548" y="46" font-size="16" font-weight="600" fill="#16A34A">rumi</text>
<text class="sans" x="548" y="66" font-size="12" fill="#9CA3AF">26 byte header, no IFD, one array</text>
<rect x="548" y="80" width="404" height="44" rx="10" fill="#ECFDF5" stroke="#16A34A" stroke-width="1"/>
<text class="mono" x="566" y="102" font-size="13" font-weight="700" fill="#166534">rumi header</text>
<text class="sans" x="566" y="118" font-size="11" fill="#5E8B73">26 bytes, fixed layout</text>

<rect x="548" y="132" width="404" height="28" rx="8" fill="#ECFDF5" stroke="#16A34A" stroke-width="1"/>
<text class="mono" x="750" y="151" text-anchor="middle" font-size="12" fill="#166534">base_tiles_offset = 4096</text>

<text class="sans" x="632" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#9CA3AF">TileByteCounts</text>
<rect x="552" y="194" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="632" y="211" text-anchor="middle" font-size="12" fill="#1A1A1A">72</text>
<rect x="552" y="224" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="632" y="241" text-anchor="middle" font-size="12" fill="#1A1A1A">52</text>
<rect x="552" y="254" width="160" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/><text class="mono" x="632" y="271" text-anchor="middle" font-size="12" fill="#1A1A1A">88</text>
<text class="mono" x="632" y="296" text-anchor="middle" font-size="14" fill="#6E7681">&#8942;</text>

<line x1="716" y1="232" x2="730" y2="232" stroke="#94A3B8" stroke-width="1.5"/><path d="M736 232 L730 235 L730 229 Z" fill="#94A3B8"/>
<text class="sans" x="740" y="214" font-size="11" fill="#9CA3AF">offsets are derived</text>
<text class="mono" x="740" y="232" font-size="11" fill="#16A34A">offset[i] = base + &#931; c[&lt;i]</text>
<text class="sans" x="740" y="250" font-size="11" fill="#9CA3AF">no offset array stored</text>

<!-- bottom flow -->
<line x1="48" y1="336" x2="952" y2="336" stroke="#E5E7EB" stroke-width="1"/>

<rect x="160" y="360" width="140" height="46" rx="10" fill="#F1F3F5" stroke="#CBD5E1"/>
<text class="mono" x="230" y="388" text-anchor="middle" font-size="13" fill="#1A1A1A">scene.tif</text>

<text class="mono" x="343" y="376" text-anchor="middle" font-size="11" fill="#16A34A">index_file</text>
<line x1="305" y1="383" x2="381" y2="383" stroke="#94A3B8" stroke-width="1.5"/><path d="M388 383 L381 387 L381 379 Z" fill="#94A3B8"/>

<rect x="388" y="360" width="180" height="46" rx="10" fill="#ECFDF5" stroke="#16A34A"/>
<text class="mono" x="478" y="380" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">rumi blob</text>
<text class="mono" x="478" y="396" text-anchor="middle" font-size="11" fill="#5E8B73">26 B + counts[N]</text>

<text class="mono" x="610" y="376" text-anchor="middle" font-size="11" fill="#16A34A">parse</text>
<line x1="573" y1="383" x2="645" y2="383" stroke="#94A3B8" stroke-width="1.5"/><path d="M652 383 L645 387 L645 379 Z" fill="#94A3B8"/>

<rect x="652" y="360" width="190" height="46" rx="10" fill="#FFFFFF" stroke="#16A34A"/>
<text class="sans" x="747" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">Header</text>
<text class="sans" x="747" y="396" text-anchor="middle" font-size="11" fill="#6B7280">offsets rebuilt, no I/O</text>
</svg>