<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" role="img" aria-label="Compression ratio versus read throughput on a Sentinel-2 band. OpenZL delta plus entropy reaches 1.80x at 290 MB per second while JPEG2000 reaches 1.91x at only 13 MB per second. Bubble size is write time.">
<style>
.mono{font-family:'Cascadia Code','Fira Code','Consolas',monospace;}
.sans{font-family:'League Spartan','Futura','Century Gothic',system-ui,sans-serif;}
</style>
<rect width="1000" height="470" fill="#FFFFFF"/>

<!-- gridlines -->
<line x1="110" y1="98"  x2="920" y2="98"  stroke="#F3F4F6" stroke-width="1"/>
<line x1="110" y1="155" x2="920" y2="155" stroke="#F3F4F6" stroke-width="1"/>
<line x1="110" y1="211" x2="920" y2="211" stroke="#F3F4F6" stroke-width="1"/>
<line x1="110" y1="267" x2="920" y2="267" stroke="#F3F4F6" stroke-width="1"/>
<line x1="110" y1="324" x2="920" y2="324" stroke="#F3F4F6" stroke-width="1"/>
<line x1="290" y1="70" x2="290" y2="380" stroke="#F3F4F6" stroke-width="1"/>
<line x1="470" y1="70" x2="470" y2="380" stroke="#F3F4F6" stroke-width="1"/>
<line x1="650" y1="70" x2="650" y2="380" stroke="#F3F4F6" stroke-width="1"/>
<line x1="830" y1="70" x2="830" y2="380" stroke="#F3F4F6" stroke-width="1"/>

<!-- axes -->
<line x1="110" y1="70" x2="110" y2="380" stroke="#E5E7EB" stroke-width="1.4"/>
<line x1="110" y1="380" x2="920" y2="380" stroke="#E5E7EB" stroke-width="1.4"/>

<!-- y labels -->
<text class="mono" x="98" y="102" text-anchor="end" font-size="10" fill="#9CA3AF">1.9</text>
<text class="mono" x="98" y="159" text-anchor="end" font-size="10" fill="#9CA3AF">1.8</text>
<text class="mono" x="98" y="215" text-anchor="end" font-size="10" fill="#9CA3AF">1.7</text>
<text class="mono" x="98" y="271" text-anchor="end" font-size="10" fill="#9CA3AF">1.6</text>
<text class="mono" x="98" y="328" text-anchor="end" font-size="10" fill="#9CA3AF">1.5</text>
<text class="mono" x="98" y="384" text-anchor="end" font-size="10" fill="#9CA3AF">1.4</text>
<!-- x labels -->
<text class="mono" x="110" y="398" text-anchor="middle" font-size="10" fill="#9CA3AF">0</text>
<text class="mono" x="290" y="398" text-anchor="middle" font-size="10" fill="#9CA3AF">100</text>
<text class="mono" x="470" y="398" text-anchor="middle" font-size="10" fill="#9CA3AF">200</text>
<text class="mono" x="650" y="398" text-anchor="middle" font-size="10" fill="#9CA3AF">300</text>
<text class="mono" x="830" y="398" text-anchor="middle" font-size="10" fill="#9CA3AF">400</text>

<!-- axis titles -->
<text class="sans" x="515" y="432" text-anchor="middle" font-size="12.5" fill="#6B7280">read throughput, MB/s</text>
<text class="sans" transform="translate(42,225) rotate(-90)" text-anchor="middle" font-size="12.5" fill="#6B7280">compression ratio</text>
<text class="sans" x="920" y="60" text-anchor="end" font-size="10.5" fill="#9CA3AF">bubble size is write time, smaller is faster</text>

<!-- bubbles, large first -->
<circle cx="133" cy="93"  r="22.4" fill="#FE6B37" fill-opacity="0.82" stroke="#E05420" stroke-width="1.2"/>
<circle cx="549" cy="363" r="15.0" fill="#94A3B8" fill-opacity="0.82" stroke="#6B7280" stroke-width="1.2"/>
<circle cx="621" cy="307" r="11.3" fill="#94A3B8" fill-opacity="0.82" stroke="#6B7280" stroke-width="1.2"/>
<circle cx="821" cy="346" r="10.6" fill="#94A3B8" fill-opacity="0.82" stroke="#6B7280" stroke-width="1.2"/>
<circle cx="864" cy="245" r="6.1"  fill="#16A34A" stroke="#166534" stroke-width="1.2"/>
<circle cx="632" cy="155" r="5.7"  fill="#16A34A" stroke="#166534" stroke-width="1.2"/>

<!-- labels -->
<text class="sans" x="162" y="80" font-size="12" font-weight="600" fill="#1A1A1A">JPEG2000 lossless</text>
<text class="sans" x="162" y="95" font-size="10.5" fill="#9CA3AF">26.4 s write</text>

<text class="sans" x="645" y="149" font-size="12" font-weight="700" fill="#166534">OpenZL delta + entropy</text>
<text class="sans" x="645" y="164" font-size="10.5" fill="#16A34A">1.1 s write</text>

<text class="sans" x="851" y="240" text-anchor="end" font-size="12" font-weight="700" fill="#166534">OpenZL transpose + entropy</text>
<text class="sans" x="851" y="255" text-anchor="end" font-size="10.5" fill="#16A34A">1.6 s write</text>

<text class="sans" x="836" y="342" font-size="12" font-weight="600" fill="#1A1A1A">ZSTD</text>
<text class="sans" x="836" y="357" font-size="10.5" fill="#9CA3AF">8.5 s</text>

<text class="sans" x="637" y="302" font-size="12" font-weight="600" fill="#1A1A1A">ZSTD + predictor</text>
<text class="sans" x="637" y="317" font-size="10.5" fill="#9CA3AF">9.6 s</text>

<text class="sans" x="531" y="350" text-anchor="end" font-size="12" font-weight="600" fill="#1A1A1A">DEFLATE</text>
<text class="sans" x="531" y="365" text-anchor="end" font-size="10.5" fill="#9CA3AF">15.2 s</text>
</svg>