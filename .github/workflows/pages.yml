name: Deploy deck to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false   # <-- evita el symlink roto de extern/openzl

      - name: Assemble site (solo el deck)
        run: |
          # Ajusta DECK_DIR si tu carpeta no se llama "deck"
          DECK_DIR=deck
          mkdir -p _site
          cp -r "$DECK_DIR"/. _site/deck/
          cp -r img _site/img/
          ls -R _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site   # <-- la clave: solo _site, NO "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4